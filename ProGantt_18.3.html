                                            <rect x={x} y={y} width={w} height={h} rx="4"
                                                fill={tool === 'eraser' ? '#fee2e2' : cat.fill}
                                                stroke={tool === 'eraser' ? '#ef4444' : cat.stroke} strokeWidth="1"
                                                className={`task-bar ${tool === 'eraser' ? 'cursor-eraser' : 'cursor-move'} ${isSelected ? 'selected-task' : ''}`}
                                                onMouseDown={(e) => {
                                                    if(tool === 'eraser') deleteTask(task.id);
                                                    else {
                                                        // Only start drag if not multi-selecting or if already selected
                                                        // Actually drag logic handles single item, multi-drag is complex, so let's stick to single
                                                        if (!e.ctrlKey && !e.metaKey) {
                                                            saveHistory(); 
                                                            setDragState({ type: 'MOVE', taskId: task.id, startX: e.clientX, initialStart: task.start, initialDur: task.duration });
                                                        }
                                                    }
                                                }}
                                            />
                                            {task.progress > 0 && tool !== 'eraser' && <rect x={x} y={y} width={pWidth} height={h} rx="4" fill="white" fillOpacity="0.3" className="progress-overlay" />}
                                            
                                            {/* REPLACED TEXT WITH FOREIGN OBJECT FOR TRUNCATION & CENTERED */}
                                            <foreignObject x={x} y={y} width={w} height={h} style={{ pointerEvents: 'none' }}>
                                                <div className="w-full h-full flex items-center justify-center px-2 overflow-hidden">
                                                    <span className="text-white text-[10px] font-semibold truncate drop-shadow-md select-none w-full text-center">
                                                        {w > 30 ? task.name : ''}
                                                    </span>
                                                </div>
                                            </foreignObject>
                                            
                                            {isGroup && tool === 'cursor' && (
                                                <path d={`M ${x} ${y+h} L ${x-5} ${y+h} L ${x-5} ${y} L ${x} ${y}`} fill="none" stroke={cat.stroke} strokeWidth="2" opacity="0.5" />
                                            )}

                                            {tool === 'cursor' && (
                                                <React.Fragment>
                                                    <rect x={x} y={y} width="8" height={h} className="resize-handle cursor-ew-resize"
                                                        onMouseDown={(e) => { e.stopPropagation(); saveHistory(); setDragState({ type: 'RESIZE_L', taskId: task.id, startX: e.clientX, initialStart: task.start, initialDur: task.duration }); }} />
                                                    <rect x={x + w - 8} y={y} width="8" height={h} className="resize-handle cursor-ew-resize"
                                                        onMouseDown={(e) => { e.stopPropagation(); saveHistory(); setDragState({ type: 'RESIZE_R', taskId: task.id, startX: e.clientX, initialStart: task.start, initialDur: task.duration }); }} />
                                                    <circle cx={x + w} cy={y + h/2} r="5" fill="white" stroke={cat.stroke} strokeWidth="2" className="connector-node cursor-connect"
                                                        onMouseDown={(e) => { e.stopPropagation(); saveHistory(); const rect = e.target.getBoundingClientRect(); const svgRect = document.getElementById('gantt-svg').getBoundingClientRect(); setDragState({ type: 'CONNECT', sourceId: task.id, startX: rect.left+5-svgRect.left, startY: rect.top+5-svgRect.top }); }} />
                                                    <circle cx={x} cy={y + h/2} r="5" fill="white" stroke={cat.stroke} strokeWidth="2" className="connector-node cursor-connect"
                                                        onMouseUp={() => { if(dragState?.type === 'CONNECT') setDragState(prev => ({ ...prev, targetId: task.id })); }} />
                                                </React.Fragment>
                                            )}
                                        </g>
                                    );
                                })}

                                {/* Today Line */}
                                <line 
                                    x1={todayX} y1={0} 
                                    x2={todayX} y2="100%" 
                                    stroke="#ef4444" 
                                    strokeWidth="2" 
                                    strokeDasharray="6,4" 
                                    className="pointer-events-none z-50"
                                />
                                {todayX >= 0 && (
                                    <text x={todayX + 4} y={12} fill="#ef4444" fontSize="10" fontWeight="bold" className="pointer-events-none">Today</text>
                                )}
                            </svg>
                        </div>
                    </div>
                </div>
                
                {/* CREDITS */}
                <div className="absolute bottom-2 right-3 text-[10px] text-slate-400 font-medium select-none pointer-events-none opacity-60 z-50">
                    Created by Ömer Ensar DURMUŞ & Gemini
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


</body></html>
